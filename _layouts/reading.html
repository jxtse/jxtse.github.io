---
layout: compress
---

<!doctype html>
<html lang="{{ site.lang | default: 'en' }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <style>
      :root {
        --reading-bg: #f7f6f2;
        --reading-paper: #fff;
        --reading-ink: #252422;
        --reading-muted: #76716b;
        --reading-border: rgba(37, 36, 34, 0.10);
        --reading-accent: #012f63;
        --reading-accent-light: #1a4f8a;
        --reading-highlight: #fe667b;
        --reading-brand-gradient: linear-gradient(90deg, #012f63 0%, #1a4f8a 68%, #fe667b 100%);
      }

      body::before {
        content: "";
        position: fixed;
        z-index: 20;
        top: 0;
        right: 0;
        left: 0;
        height: 3px;
        background: var(--reading-brand-gradient);
        pointer-events: none;
      }

      /* Reading mode: no global site chrome, only the article and a quiet rail. */
      .masthead, .sidebar, .page__footer { display: none !important; }
      html { background: var(--reading-bg); }
      body {
        margin: 0;
        background: var(--reading-bg);
        color: var(--reading-ink);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .reading-shell {
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: 0 2rem;
      }

      .reading-grid {
        position: relative;
        display: block;
      }

      .reading-rail {
        position: fixed;
        top: 0;
        bottom: 0;
        left: max(1.5rem, calc(50vw - 36.5rem));
        width: 160px;
        padding-top: 2.25rem;
        border-right: 1px solid var(--reading-border);
      }

      .reading-back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--reading-muted);
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
        text-decoration: none;
        transition: color 160ms ease;
      }
      .reading-back:hover { color: var(--reading-accent); text-decoration: none; }
      .reading-back::after { display: none !important; }
      .reading-back svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .reading-progress-track {
        width: 100%;
        height: 2px;
        margin-top: 1.4rem;
        background: rgba(37, 36, 34, 0.09);
        overflow: hidden;
      }
      .reading-progress-bar {
        display: block;
        width: 100%;
        height: 100%;
        background: var(--reading-brand-gradient);
        transform: scaleX(0);
        transform-origin: left center;
        transition: transform 80ms linear;
      }
      .reading-progress-label,
      .reading-toc-title {
        display: block;
        color: #9a958e;
        font-size: 0.72rem;
        letter-spacing: 0.02em;
      }
      .reading-progress-label { margin-top: 0.55rem; }
      .reading-toc {
        margin-top: 1.8rem;
        padding-right: 1.15rem;
      }
      .reading-toc-title {
        margin-bottom: 0.7rem;
        color: var(--reading-accent);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .reading-toc-list {
        display: grid;
        gap: 0.15rem;
      }
      .reading-toc-link {
        display: block;
        padding: 0.33rem 0 0.33rem 0.7rem;
        color: #817b75;
        font-size: 0.75rem;
        line-height: 1.38;
        text-decoration: none;
        border-left: 1px solid #ddd8d1;
        transition: color 150ms ease, border-color 150ms ease;
      }
      .reading-toc-link:hover,
      .reading-toc-link.is-active {
        color: var(--reading-accent);
        border-left-color: var(--reading-accent);
        text-decoration: none;
      }
      .reading-toc-link.is-active {
        font-weight: 600;
        background: linear-gradient(90deg, rgba(1, 47, 99, 0.07), transparent 88%);
      }
      .reading-toc-link::after { display: none !important; }
      .reading-toc-link[data-level="3"] {
        padding-left: 1.2rem;
        color: #9a958e;
        font-size: 0.7rem;
      }
      .reading-toc-empty {
        display: none;
      }

      .reading-paper {
        width: min(100%, 760px);
        min-width: 0;
        min-height: 100vh;
        margin: 0 auto;
        padding: 3.75rem 4.25rem 7rem;
        background: var(--reading-paper);
        border-left: 1px solid var(--reading-border);
        border-right: 1px solid var(--reading-border);
      }

      .reading-paper .post-article {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .reading-paper .post-header {
        margin: 0 0 3rem;
        padding: 0 0 2rem;
        border-bottom: 1px solid var(--reading-border);
      }
      .reading-paper .post-cover {
        margin: 0 0 2.25rem;
        border-radius: 0;
        overflow: hidden;
        box-shadow: none;
      }
      .reading-paper .post-cover img {
        width: 100%;
        height: auto;
        display: block;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }
      .reading-paper .post-title {
        margin: 0;
        padding: 0;
        color: #1f1e1c;
        font-size: clamp(2.1rem, 3.2vw, 3rem);
        font-weight: 700;
        line-height: 1.12;
        letter-spacing: -0.035em;
        border: 0;
      }
      .reading-paper .post-title::after {
        content: "";
        display: block;
        width: 3.25rem;
        height: 3px;
        margin-top: 1.15rem;
        border-radius: 999px;
        background: var(--reading-brand-gradient);
      }
      .reading-paper .post-description {
        max-width: 42rem;
        margin: 1.15rem 0 0;
        color: #68635e;
        font-size: 1.03rem;
        line-height: 1.65;
      }

      .reading-paper .post-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
        margin: 1.35rem 0 0;
        color: #918b84;
        font-size: 0.78rem;
        line-height: 1.4;
        white-space: normal;
        overflow: visible;
      }
      .reading-paper .post-meta-item,
      .reading-paper .post-meta > span {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      .reading-paper .post-meta i,
      .reading-paper .post-meta time,
      .reading-paper .post-categories-list,
      .reading-paper .post-original-link {
        color: inherit;
        font-weight: 400;
      }
      .reading-paper .post-meta i { color: var(--reading-accent-light); }
      .reading-paper .post-original-link { text-decoration: none; }
      .reading-paper .post-original-link:hover { color: var(--reading-accent); text-decoration: none; }
      .reading-paper .post-original-link::after { display: none !important; }
      .reading-paper .post-meta-separator { color: #c2bdb7; }

      .reading-paper .post-content {
        color: #302e2b;
        font-size: 1.075rem;
        line-height: 1.92;
        letter-spacing: 0.005em;
        text-align: left;
        overflow-wrap: break-word;
      }
      .reading-paper .post-content p { margin: 0 0 1.55em; }
      .reading-paper .post-content h1,
      .reading-paper .post-content h2,
      .reading-paper .post-content h3,
      .reading-paper .post-content h4,
      .reading-paper .post-content h5,
      .reading-paper .post-content h6 {
        color: #242321;
        font-weight: 650;
        line-height: 1.3;
        letter-spacing: -0.018em;
      }
      .reading-paper .post-content h1::before,
      .reading-paper .post-content h2::before {
        content: "";
        display: inline-block;
        width: 3px;
        height: 0.82em;
        margin-right: 0.62rem;
        border-radius: 999px;
        background: var(--reading-brand-gradient);
        vertical-align: -0.04em;
      }
      .reading-paper .post-content h1 {
        margin: 3.4rem 0 1.25rem;
        font-size: 1.75rem;
      }
      .reading-paper .post-content h2 {
        margin: 4.25rem 0 1.35rem;
        padding-top: 0.4rem;
        font-size: 1.55rem;
        border: 0;
      }
      .reading-paper .post-content h3 {
        margin: 3rem 0 1rem;
        font-size: 1.25rem;
      }
      .reading-paper .post-content a {
        color: var(--reading-accent);
        text-decoration: none;
        border-bottom: 0;
      }
      .reading-paper .post-content a:hover { color: #0a4b8c; text-decoration: none; }
      .reading-paper .post-content a::after { display: none !important; }
      .reading-paper .post-content blockquote {
        margin: 2.25rem 0;
        padding: 0.25rem 0 0.25rem 1.35rem;
        color: #625e58 !important;
        background: transparent !important;
        border-left: 2px solid #c8c3bc;
        border-radius: 0;
        box-shadow: none;
      }
      .reading-paper .post-content img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 2.25rem auto;
        border-radius: 0;
        box-shadow: none;
      }
      .reading-paper .post-content hr {
        width: 3rem;
        margin: 4rem auto;
        border: 0;
        border-top: 1px solid #cbc6bf;
      }
      .reading-paper .post-content code { color: inherit; }

      @media (max-width: 980px) {
        .reading-shell { width: min(100%, 800px); padding: 0; }
        .reading-grid { display: block; }
        .reading-rail {
          position: static;
          width: auto;
          left: auto;
          margin-left: 0;
          padding: 1rem 1.25rem 0;
          border-right: 0;
        }
        .reading-progress-track,
        .reading-progress-label,
        .reading-toc { display: none; }
        .reading-paper {
          width: 100%;
          min-height: 0;
          margin: 0;
          padding: 2rem 2rem 5rem;
          border: 0;
        }
      }

      @media (max-width: 600px) {
        html, body, .reading-paper { background: #fff; }
        .reading-rail { padding: 1rem 1.5rem 0; }
        .reading-paper { padding: 1.75rem 1.5rem 4rem; }
        .reading-paper .post-header { margin-bottom: 2.25rem; padding-bottom: 1.5rem; }
        .reading-paper .post-cover { margin-bottom: 1.6rem; }
        .reading-paper .post-title {
          font-size: 2rem;
          line-height: 1.16;
          letter-spacing: -0.025em;
        }
        .reading-paper .post-description { font-size: 0.97rem; line-height: 1.62; }
        .reading-paper .post-meta {
          display: grid;
          grid-template-columns: auto auto auto;
          justify-content: start;
          align-items: center;
          width: max-content;
          max-width: 100%;
          font-size: clamp(0.66rem, 2.8vw, 0.76rem);
          gap: 0.3rem;
          white-space: nowrap;
        }
        .reading-paper .post-meta-item,
        .reading-paper .post-meta > span {
          min-width: 0;
          flex-wrap: nowrap;
        }
        .reading-paper .post-categories-list { white-space: nowrap; }
        .reading-paper .post-meta-separator { display: inline-flex; }
        .reading-paper .post-content { font-size: 1.04rem; line-height: 1.86; letter-spacing: 0; }
        .reading-paper .post-content p { margin-bottom: 1.45em; }
        .reading-paper .post-content h2 { margin-top: 3.25rem; }
      }

      @media (prefers-reduced-motion: reduce) {
        .reading-progress-bar, .reading-back { transition: none; }
      }
    </style>
  </head>

  <body>
    {% include browser-upgrade.html %}

    <div class="reading-shell">
      <div class="reading-grid">
        <aside class="reading-rail" aria-label="Article navigation">
          <a href="{{ '/blog/' | relative_url }}" class="reading-back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            All posts
          </a>
          <div class="reading-progress-track" aria-hidden="true">
            <span class="reading-progress-bar" id="reading-progress-bar"></span>
          </div>
          <span class="reading-progress-label" aria-hidden="true">Reading progress</span>
          <nav class="reading-toc reading-toc-empty" id="reading-toc" aria-label="Table of contents">
            <span class="reading-toc-title">Contents</span>
            <div class="reading-toc-list" id="reading-toc-list"></div>
          </nav>
        </aside>

        <main class="reading-paper">
          {{ content }}
        </main>
      </div>
    </div>

    {% include scripts.html %}
    <script>
      (function () {
        var bar = document.getElementById('reading-progress-bar');
        var toc = document.getElementById('reading-toc');
        var tocList = document.getElementById('reading-toc-list');
        var headings = Array.prototype.slice.call(
          document.querySelectorAll('.post-content h1, .post-content h2, .post-content h3')
        );
        var tocLinks = [];
        var activeIndex = -1;

        function uniqueId(text, index) {
          var base = text.toLowerCase()
            .trim()
            .replace(/[^\w\u3400-\u9fff-]+/g, '-')
            .replace(/^-+|-+$/g, '');
          if (!base) base = 'section-' + (index + 1);
          var candidate = base;
          var suffix = 2;
          while (document.getElementById(candidate)) {
            candidate = base + '-' + suffix;
            suffix += 1;
          }
          return candidate;
        }

        if (toc && tocList && headings.length) {
          headings.forEach(function (heading, index) {
            if (!heading.id) heading.id = uniqueId(heading.textContent, index);
            var link = document.createElement('a');
            link.className = 'reading-toc-link';
            link.href = '#' + heading.id;
            link.dataset.level = heading.tagName.slice(1);
            link.textContent = heading.textContent.trim();
            link.addEventListener('click', function (event) {
              event.preventDefault();
              heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
              if (history.replaceState) history.replaceState(null, '', '#' + heading.id);
            });
            tocList.appendChild(link);
            tocLinks.push(link);
          });
          toc.classList.remove('reading-toc-empty');
        }

        function updateActiveHeading() {
          if (!headings.length) return;
          var nextIndex = 0;
          var threshold = Math.min(180, window.innerHeight * 0.24);
          headings.forEach(function (heading, index) {
            if (heading.getBoundingClientRect().top <= threshold) nextIndex = index;
          });
          if (nextIndex === activeIndex) return;
          activeIndex = nextIndex;
          tocLinks.forEach(function (link, index) {
            link.classList.toggle('is-active', index === activeIndex);
          });
        }

        var ticking = false;
        function updateReadingState() {
          var root = document.documentElement;
          var max = root.scrollHeight - root.clientHeight;
          var progress = max > 0 ? Math.min(1, Math.max(0, root.scrollTop / max)) : 0;
          if (bar) bar.style.transform = 'scaleX(' + progress + ')';
          updateActiveHeading();
          ticking = false;
        }
        function requestUpdate() {
          if (!ticking) {
            window.requestAnimationFrame(updateReadingState);
            ticking = true;
          }
        }
        window.addEventListener('scroll', requestUpdate, { passive: true });
        window.addEventListener('resize', requestUpdate);
        updateReadingState();
      }());
    </script>
  </body>
</html>
